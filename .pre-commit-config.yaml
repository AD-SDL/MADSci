repos:
  - repo: https://github.com/kynan/nbstripout
    rev: 0.8.2
    hooks:
      - id: nbstripout
  - repo: https://github.com/astral-sh/ruff-pre-commit
    # Ruff version.
    rev: v0.14.9
    hooks:
      # Run the linter.
      - id: ruff-check
        args: [--fix]
      # Run the formatter.
      - id: ruff-format
  - repo: https://gitlab.com/bmares/check-json5
    rev: v1.0.0
    hooks:
    - id: check-json5
  - repo: https://github.com/jag-k/pydantic-settings-export
    # Use a tag version with the `v` prefix (e.g. v1.0.0)
    rev: v1.0.3
    hooks:
     - id: pydantic-settings-export
       entry: pdm run pydantic-settings-export
       language: system
       files: ^src/madsci_common/madsci/common/types/.*\.py$
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-yaml
      - id: check-toml
      - id: check-ast
      - id: check-merge-conflict
      - id: check-added-large-files
      - id: mixed-line-ending
      - id: end-of-file-fixer
      - id: trailing-whitespace

  - repo: local
    hooks:
      - id: madsci-logging-patterns
        name: MADSci logging patterns
        entry: python scripts/precommit_check_logging_patterns.py
        language: system
        types: [python]
        files: ^src/.*\.py$
        exclude: ^(tests/|src/.*/tests/|(?!src/(madsci_common/madsci/common/(manager_base\.py|types/event_types\.py|backup_tools/backup_manager\.py)|madsci_event_manager/madsci/event_manager/(event_server\.py|notifications\.py|utilization_analyzer\.py|time_series_analyzer\.py)|madsci_resource_manager/madsci/resource_manager/(resource_server\.py|migration_tool\.py)|madsci_location_manager/madsci/location_manager/(location_server\.py|transfer_planner\.py)|madsci_data_manager/madsci/data_manager/data_server\.py|madsci_experiment_manager/madsci/experiment_manager/experiment_server\.py|madsci_squid/madsci/squid/lab_server\.py|madsci_squid/madsci/squid/__init__\.py|madsci_workcell_manager/madsci/workcell_manager/(workcell_engine\.py|workcell_server\.py)|madsci_node_module/madsci/node_module/(abstract_node_module\.py|helpers\.py|rest_node_module\.py|type_analyzer\.py|__init__\.py)|madsci_client/madsci/client/(client_mixin\.py|location_client\.py)|madsci_experiment_application/madsci/experiment_application/experiment_application\.py)$).*$)
