# Prometheus Configuration for MADSci Example Lab
#
# This minimal configuration is designed to work with the OpenTelemetry Collector
# which pushes metrics via remote write. No scrape targets are needed since
# the collector handles all metric collection and forwarding.

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  # Attach deployment labels to all metrics
  external_labels:
    environment: development
    lab: madsci_example

# Alertmanager configuration (optional - not configured by default)
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets: []

# Rule files (optional - not configured by default)
# rule_files:
#   - /etc/prometheus/rules/*.rules.yml

# Remote write receiver is enabled via command line flags in compose.otel.yaml
# The collector pushes metrics to http://prometheus:9090/api/v1/write

# Optional: scrape Prometheus itself for self-monitoring
scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
        labels:
          service: prometheus

  # Optional: scrape the OTEL collector metrics endpoint
  - job_name: "otel-collector"
    static_configs:
      - targets: ["localhost:8888"]
        labels:
          service: otel-collector
