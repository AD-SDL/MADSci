# Infrastructure services for the MADSci Example Lab.
# Provides MongoDB, Redis, PostgreSQL, and MinIO.

services:
  madsci_mongodb:
    container_name: madsci_mongodb
    image: mongo:8.0
    restart: unless-stopped
    ports:
      - ${MONGODB_PORT:-27017}:27017
    volumes:
      - ${REPO_PATH:-../..}/.madsci/mongodb:/data/db

  madsci_redis:
    container_name: madsci_redis
    image: redis:7.4
    restart: unless-stopped
    ports:
      - ${REDIS_PORT:-6379}:6379
    volumes:
      - ${REPO_PATH:-../..}/.madsci/redis:/data
    command: redis-server --appendonly yes --save 900 1 --save 300 10 --save 60 10000

  madsci_postgres:
    container_name: madsci_postgres
    image: postgres:17
    restart: unless-stopped
    environment:
      - POSTGRES_USER=madsci
      - POSTGRES_PASSWORD=madsci
      - POSTGRES_DB=resources
    ports:
      - ${POSTGRES_PORT:-5432}:5432
    volumes:
      - ${REPO_PATH:-../..}/.madsci/postgresql/data:/var/lib/postgresql/data

  madsci_minio:
    container_name: madsci_minio
    image: minio/minio
    restart: unless-stopped
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    ports:
      - ${MINIO_PORT:-9000}:9000
      - ${MINIO_CONSOLE_PORT:-9001}:9001
    volumes:
      - ${REPO_PATH:-../..}/.madsci/minio:/home/madsci/.madsci/minio
    command: server /home/madsci/.madsci/minio --console-address ":9001"
