# See docs at: https://mystmd.org/guide/frontmatter
version: 1
project:
  id: 28284e97-73d9-4530-8b03-07590bc53b3d
  title: MADSci Documentation
  description: >
    MADSci (Modular Autonomous Discovery for Science) is an open-source framework for building modular, autonomous
    scientific laboratories. It provides a suite of services and tools to
    facilitate experiment design, execution, data management, and analysis,
    enabling researchers to automate and accelerate their scientific workflows.
  keywords: [MADSci, autonomous labs, self-driving labs, scientific automation, experiment management, data analysis, robotics]
  authors:
    - name: Rapid Prototyping Lab, Argonne National Laboratory
  github: https://github.com/AD-SDL/MADSci

  # Exclude common files that shouldn't be built
  exclude:
    - '**/__pycache__/**'
    - '**/.pytest_cache/**'
    - '**/.ruff_cache/**'
    - '**/.venv/**'
    - '**/.pdm-build/**'
    - '**/node_modules/**'
    - '**/.git/**'
    - '**/dist/**'
    - '**/build/**'
    - '**/*.pyc'
    - 'CLAUDE.md'
    - '**/CLAUDE.md'
    - 'AGENTS.md'
    - '**/AGENTS.md'
    - 'skills/**'
    - '.scratch/**'
    - 'docs/rest-api/*.html'
    - 'docs/api-specs/*.json'

  toc:
    - file: README.md
    - file: docs/CHANGELOG.md
    - file: docs/Configuration.md

    - title: Enabled By MADSci
      children:
        - pattern: docs/madsci_powered/*.md

    - title: Tutorials
      children:
        - file: docs/tutorials/01-exploration.md
        - file: docs/tutorials/02-first-node.md
        - file: docs/tutorials/03-first-experiment.md
        - file: docs/tutorials/04-first-workcell.md
        - file: docs/tutorials/05-full-lab.md

    - title: Guides
      children:
        - file: docs/guides/cli_reference.md
        - file: docs/guides/template_catalog.md
        - file: docs/guides/logging.md
        - file: docs/guides/migration.md
        - file: docs/guides/migration_from_definitions.md
        - file: docs/guides/node_development.md
        - file: docs/guides/workflow_development.md
        - file: docs/guides/observability.md
        - file: docs/guides/troubleshooting.md
        - file: docs/guides/agent_skills.md

    - title: Equipment Integrator Guide
      children:
        - file: docs/guides/integrator/README.md
        - file: docs/guides/integrator/01-understanding-modules.md
        - file: docs/guides/integrator/02-creating-a-module.md
        - file: docs/guides/integrator/03-developing-interfaces.md
        - file: docs/guides/integrator/04-fake-interfaces.md
        - file: docs/guides/integrator/05-wiring-the-node.md
        - file: docs/guides/integrator/06-testing-strategies.md
        - file: docs/guides/integrator/07-debugging.md
        - file: docs/guides/integrator/08-packaging-deployment.md
        - file: docs/guides/integrator/09-publishing.md

    - title: Lab Operator Guide
      children:
        - file: docs/guides/operator/README.md
        - file: docs/guides/operator/01-daily-operations.md
        - file: docs/guides/operator/02-monitoring.md
        - file: docs/guides/operator/03-backup-recovery.md
        - file: docs/guides/operator/04-troubleshooting.md
        - file: docs/guides/operator/05-updates-maintenance.md

    - title: Experimentalist Guide
      children:
        - file: docs/guides/experimentalist/README.md
        - file: docs/guides/experimentalist/01-running-experiments.md
        - file: docs/guides/experimentalist/02-working-with-data.md
        - file: docs/guides/experimentalist/03-managing-resources.md
        - file: docs/guides/experimentalist/04-experiment-design.md
        - file: docs/guides/experimentalist/05-jupyter-notebooks.md

    - title: Example Lab
      children:
        - file: examples/example_lab/README.md

    - title: Example Notebooks
      children:
        - pattern: examples/notebooks/*.ipynb

    - title: Core Packages
      children:
        # Automatically include all package READMEs - titles from frontmatter/headings
        - file: src/madsci_common/README.md
          children:
            - pattern: src/madsci_common/**/README.md
        - file: src/madsci_client/README.md
        - file: src/madsci_squid/README.md
        - file: src/madsci_node_module/README.md
        - file: src/madsci_experiment_application/README.md

    - title: Manager Services
      children:
        # Automatically include all manager READMEs - titles from frontmatter/headings
        - file: src/madsci_event_manager/README.md
        - file: src/madsci_experiment_manager/README.md
        - file: src/madsci_resource_manager/README.md
        - file: src/madsci_data_manager/README.md
        - file: src/madsci_workcell_manager/README.md
        - file: src/madsci_location_manager/README.md

    - title: REST API Reference
      children:
        - file: docs/rest-api/index.md

    - title: User Interface
      children:
        - file: ui/README.md
        # Automatically include UI documentation - titles from frontmatter/headings
        - pattern: ui/src/*/README.md

    - file: CONTRIBUTING.md
    - file: paper.md

    - title: API Documentation
      children:
        # Main API index
        - file: docs/api/madsci/index.md

        # Client APIs
        - file: docs/api/madsci/client/index.md
          children:
            - pattern: docs/api/madsci/client/*.md
            - pattern: docs/api/madsci/client/node/*.md
            - file: docs/api/madsci/client/cli/index.md
              children:
                - pattern: docs/api/madsci/client/cli/commands/*.md
                - file: docs/api/madsci/client/cli/tui/index.md
                  children:
                    - pattern: docs/api/madsci/client/cli/tui/*.md
                    - pattern: docs/api/madsci/client/cli/tui/screens/*.md
                    - pattern: docs/api/madsci/client/cli/tui/styles/*.md
                    - pattern: docs/api/madsci/client/cli/tui/widgets/*.md
                - file: docs/api/madsci/client/cli/utils/index.md
                  children:
                    - pattern: docs/api/madsci/client/cli/utils/*.md

        # Common utilities and types
        - file: docs/api/madsci/common/index.md
          children:
            - pattern: docs/api/madsci/common/**/*.md

        # Core Packages
        - title: Core Packages
          children:
            - file: docs/api/madsci/squid/index.md
              children:
                - pattern: docs/api/madsci/squid/*.md
            - file: docs/api/madsci/node_module/index.md
              children:
                - pattern: docs/api/madsci/node_module/*.md
            - file: docs/api/madsci/experiment_application/index.md
              children:
                - pattern: docs/api/madsci/experiment_application/**/*.md

        # Manager Services
        - title: Manager Services
          children:
            - file: docs/api/madsci/event_manager/index.md
              children:
                - pattern: docs/api/madsci/event_manager/*.md
            - file: docs/api/madsci/experiment_manager/index.md
              children:
                - pattern: docs/api/madsci/experiment_manager/*.md
            - file: docs/api/madsci/resource_manager/index.md
              children:
                - pattern: docs/api/madsci/resource_manager/*.md
            - file: docs/api/madsci/data_manager/index.md
              children:
                - pattern: docs/api/madsci/data_manager/*.md
            - file: docs/api/madsci/workcell_manager/index.md
              children:
                - pattern: docs/api/madsci/workcell_manager/**/*.md
            - file: docs/api/madsci/location_manager/index.md
              children:
                - pattern: docs/api/madsci/location_manager/*.md

site:
  template: book-theme
  options:
    favicon: ui/public/favicon.ico
    logo: assets/madsci_logo.svg
