# OpenTelemetry Observability Stack for MADSci Example Lab
#
# This compose file extends the base compose.yaml with full observability infrastructure:
# - Jaeger: Distributed tracing UI (http://localhost:16686)
# - Prometheus: Metrics collection and querying (http://localhost:9090)
# - Loki: Log aggregation (http://localhost:3100)
# - Grafana: Unified dashboards (http://localhost:3000)
#
# Usage:
#   docker compose -f compose.yaml -f compose.otel.yaml up
#
# Note: The base compose.yaml includes otel_collector which receives OTLP telemetry.
# This file adds the backends for storage and visualization.
#
# Default credentials:
#   Grafana: admin / admin (change on first login)
#
# Port bindings default to localhost-only for security. To expose to other hosts,
# override the port bindings in a local .env file or use a proxy.

name: madsci_example_lab

services:
  # Override otel_collector to add exporters for the full observability stack
  otel_collector:
    container_name: otel_collector
    # Pin to a specific version for reproducibility
    image: otel/opentelemetry-collector-contrib:0.96.0
    restart: unless-stopped
    network_mode: host
    volumes:
      - ${REPO_PATH:-.}/example_lab/otel-collector-full.yaml:/etc/otelcol/config.yaml:ro
    command: ["--config=/etc/otelcol/config.yaml"]
    depends_on:
      - jaeger
      - prometheus
      - loki

  # Jaeger - Distributed Tracing
  # UI: http://localhost:16686
  jaeger:
    container_name: jaeger
    image: jaegertracing/all-in-one:1.54.0
    restart: unless-stopped
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    ports:
      # UI - localhost only for security
      - "127.0.0.1:16686:16686"
      # OTLP gRPC (collector receives from otel-collector)
      - "127.0.0.1:4318:4317"
    volumes:
      - ${REPO_PATH:-.}/.madsci/jaeger:/badger

  # Prometheus - Metrics
  # UI: http://localhost:9090
  prometheus:
    container_name: prometheus
    image: prom/prometheus:v2.50.1
    restart: unless-stopped
    ports:
      # UI - localhost only for security
      - "127.0.0.1:9090:9090"
    volumes:
      - ${REPO_PATH:-.}/example_lab/otel/prometheus.yaml:/etc/prometheus/prometheus.yml:ro
      - ${REPO_PATH:-.}/.madsci/prometheus:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
      - "--web.enable-remote-write-receiver"

  # Loki - Log Aggregation
  # API: http://localhost:3100
  loki:
    container_name: loki
    image: grafana/loki:2.9.4
    restart: unless-stopped
    ports:
      # API - localhost only for security
      - "127.0.0.1:3100:3100"
    volumes:
      - ${REPO_PATH:-.}/example_lab/otel/loki.yaml:/etc/loki/local-config.yaml:ro
      - ${REPO_PATH:-.}/.madsci/loki:/loki
    command: -config.file=/etc/loki/local-config.yaml

  # Grafana - Unified Dashboards
  # UI: http://localhost:3000 (admin/admin)
  grafana:
    container_name: grafana
    image: grafana/grafana:10.3.3
    restart: unless-stopped
    environment:
      # Default admin password - CHANGE IN PRODUCTION
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=http://localhost:3000
      # Enable anonymous access for local development (read-only)
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
    ports:
      # UI - localhost only for security
      - "127.0.0.1:3000:3000"
    volumes:
      - ${REPO_PATH:-.}/.madsci/grafana:/var/lib/grafana
      - ${REPO_PATH:-.}/example_lab/otel/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - jaeger
      - prometheus
      - loki
