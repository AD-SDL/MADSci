# Grafana Datasource Provisioning for MADSci Example Lab
#
# This file auto-configures Grafana to connect to the observability backends.
# https://grafana.com/docs/grafana/latest/administration/provisioning/#datasources

apiVersion: 1

datasources:
  # Jaeger - Distributed Tracing
  - name: Jaeger
    type: jaeger
    access: proxy
    url: http://localhost:16686
    isDefault: false
    editable: true
    jsonData:
      tracesToLogsV2:
        datasourceUid: loki
        tags: [{key: "service.name", value: "service_name"}]
        mappedTags: [{key: "service.name", value: "service_name"}]
        mapTagNamesEnabled: true
        filterByTraceID: true
        filterBySpanID: true
      nodeGraph:
        enabled: true
      traceQuery:
        timeShiftEnabled: true
        spanStartTimeShift: "-30m"
        spanEndTimeShift: "30m"

  # Prometheus - Metrics
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://localhost:9090
    isDefault: true
    editable: true
    jsonData:
      timeInterval: "15s"
      httpMethod: "POST"
      exemplarTraceIdDestinations:
        - datasourceUid: jaeger
          name: trace_id

  # Loki - Logs
  - name: Loki
    type: loki
    access: proxy
    url: http://localhost:3100
    isDefault: false
    editable: true
    uid: loki
    jsonData:
      maxLines: 1000
      derivedFields:
        # Link trace_id in logs to Jaeger
        - datasourceUid: jaeger
          matcherRegex: '"trace_id":"([a-f0-9]+)"'
          name: TraceID
          url: "$${__value.raw}"
