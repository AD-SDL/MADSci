name: "Mock Interface"
version: "1.0.0"
description: "A pytest mock-based interface for unit testing"
category: "interface"
tags: ["mock", "testing", "pytest"]
skills: ["madsci-nodes"]

author: "MADSci Team"
license: "MIT"
min_madsci_version: "0.6.0"
schema_version: "1.0"

parameters:
  - name: module_name
    type: string
    description: "Module name (must match existing module)"
    required: true
    pattern: "^[a-z][a-z0-9_]*$"
    default: "my_module"

files:
  - source: "{{module_name}}_mock_interface.py.j2"
    destination: "src/{{module_name}}_mock_interface.py"

hooks:
  post_generate:
    - command: "ruff format src/{{module_name}}_mock_interface.py"
      description: "Format generated code"
      continue_on_error: true
