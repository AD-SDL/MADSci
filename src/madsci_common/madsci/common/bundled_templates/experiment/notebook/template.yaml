name: "Notebook Experiment"
version: "1.0.0"
description: "An interactive Jupyter notebook experiment"
category: "experiment"
tags: ["notebook", "jupyter", "interactive"]
skills: ["madsci-experiments"]

author: "MADSci Team"
license: "MIT"
min_madsci_version: "0.7.0"
schema_version: "1.0"

parameters:
  - name: experiment_name
    type: string
    description: "Experiment name (lowercase, underscores allowed)"
    required: true
    pattern: "^[a-z][a-z0-9_]*$"
    default: "my_experiment"

  - name: experiment_description
    type: string
    description: "Human-readable description of the experiment"
    required: true
    default: "A MADSci notebook experiment"

  - name: author_name
    type: string
    description: "Author name"
    required: false
    default: ""

  - name: lab_server_url
    type: string
    description: "URL of the MADSci lab server"
    required: false
    default: "http://localhost:8000/"

files:
  - source: "{{experiment_name}}.ipynb.j2"
    destination: "{{experiment_name}}.ipynb"
