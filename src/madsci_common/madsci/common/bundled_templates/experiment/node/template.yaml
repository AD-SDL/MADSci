name: "Node Experiment"
version: "1.0.0"
description: "A REST API server experiment using ExperimentNode modality"
category: "experiment"
tags: ["node", "server", "rest", "api"]
skills: ["madsci-experiments"]

author: "MADSci Team"
license: "MIT"
min_madsci_version: "0.7.0"
schema_version: "1.0"

parameters:
  - name: experiment_name
    type: string
    description: "Experiment name (lowercase, underscores allowed)"
    required: true
    pattern: "^[a-z][a-z0-9_]*$"
    default: "my_experiment"

  - name: experiment_description
    type: string
    description: "Human-readable description of the experiment"
    required: true
    default: "A MADSci server experiment"

  - name: author_name
    type: string
    description: "Author name"
    required: false
    default: ""

  - name: server_port
    type: integer
    description: "Port for the experiment REST API server"
    required: true
    default: 6000
    min: 1024
    max: 65535

files:
  - source: "{{experiment_name}}_node.py.j2"
    destination: "{{experiment_name}}_node.py"

hooks:
  post_generate:
    - command: "ruff format {{experiment_name}}_node.py"
      description: "Format generated code"
      continue_on_error: true
