name: "Liquid Handler Module"
version: "1.0.0"
description: "A liquid handling module with aspirate, dispense, and transfer actions"
category: "module"
tags: ["liquid-handler", "pipetting", "automation"]
skills: ["madsci-nodes"]

author: "MADSci Team"
license: "MIT"
min_madsci_version: "0.6.0"
schema_version: "1.0"

parameters:
  - name: module_name
    type: string
    description: "Module name (lowercase, underscores allowed)"
    required: true
    pattern: "^[a-z][a-z0-9_]*$"
    default: "my_liquid_handler"

  - name: module_description
    type: string
    description: "Human-readable description of the module"
    required: true
    default: "A MADSci liquid handler module"

  - name: author_name
    type: string
    description: "Author name"
    required: false
    default: ""

  - name: port
    type: integer
    description: "Default port number for the node REST API"
    required: true
    default: 2000
    min: 1024
    max: 65535

  - name: include_tests
    type: boolean
    description: "Include test files"
    required: false
    default: true

  - name: include_dockerfile
    type: boolean
    description: "Include Dockerfile"
    required: false
    default: true

  - name: include_dev_tooling
    type: boolean
    description: "Include developer tooling (pre-commit, ruff config, justfile)"
    required: false
    default: true

  - name: include_agent_config
    type: multi_choice
    description: "Include agentic coding configuration files"
    required: false
    choices:
      - value: claude
        label: "Claude Code (CLAUDE.md, .claude/skills/)"
        default: true
      - value: agents
        label: "Agents (AGENTS.md, .agents/skills/)"
        default: true

files:
  - source: "{{module_name}}_module/src/{{module_name}}_rest_node.py.j2"
    destination: "{{module_name}}_module/src/{{module_name}}_rest_node.py"

  - source: "{{module_name}}_module/src/{{module_name}}_interface.py.j2"
    destination: "{{module_name}}_module/src/{{module_name}}_interface.py"

  - source: "{{module_name}}_module/src/{{module_name}}_fake_interface.py.j2"
    destination: "{{module_name}}_module/src/{{module_name}}_fake_interface.py"

  - source: "{{module_name}}_module/src/{{module_name}}_types.py.j2"
    destination: "{{module_name}}_module/src/{{module_name}}_types.py"

  - source: "{{module_name}}_module/tests/__init__.py.j2"
    destination: "{{module_name}}_module/tests/__init__.py"
    condition: "{{ include_tests }}"

  - source: "{{module_name}}_module/tests/test_{{module_name}}_interface.py.j2"
    destination: "{{module_name}}_module/tests/test_{{module_name}}_interface.py"
    condition: "{{ include_tests }}"

  - source: "{{module_name}}_module/pyproject.toml.j2"
    destination: "{{module_name}}_module/pyproject.toml"

  - source: "{{module_name}}_module/README.md.j2"
    destination: "{{module_name}}_module/README.md"

  - source: "{{module_name}}_module/Dockerfile.j2"
    destination: "{{module_name}}_module/Dockerfile"
    condition: "{{ include_dockerfile }}"

  - source: ".gitignore"
    destination: "{{module_name}}_module/.gitignore"

  - source: "docs/README.md.j2"
    destination: "{{module_name}}_module/docs/README.md"

  - source: "docs/private/.gitkeep"
    destination: "{{module_name}}_module/docs/private/.gitkeep"

  - source: "src/drivers/__init__.py.j2"
    destination: "{{module_name}}_module/src/drivers/__init__.py"

  - source: "src/drivers/private/.gitkeep"
    destination: "{{module_name}}_module/src/drivers/private/.gitkeep"

  - source: "notebooks/interface_testing.ipynb.j2"
    destination: "{{module_name}}_module/notebooks/interface_testing.ipynb"

  - source: "notebooks/node_testing.ipynb.j2"
    destination: "{{module_name}}_module/notebooks/node_testing.ipynb"

  - source: "docker-compose.yaml.j2"
    destination: "{{module_name}}_module/docker-compose.yaml"
    condition: "{{ include_dockerfile }}"

  - source: ".pre-commit-config.yaml.j2"
    destination: "{{module_name}}_module/.pre-commit-config.yaml"
    condition: "{{ include_dev_tooling }}"

  - source: "ruff.toml.j2"
    destination: "{{module_name}}_module/ruff.toml"
    condition: "{{ include_dev_tooling }}"

  - source: "justfile.j2"
    destination: "{{module_name}}_module/justfile"
    condition: "{{ include_dev_tooling }}"

  - source: "CLAUDE.md.j2"
    destination: "{{module_name}}_module/CLAUDE.md"
    condition: "{{ 'claude' in include_agent_config }}"

  - source: "AGENTS.md.j2"
    destination: "{{module_name}}_module/AGENTS.md"
    condition: "{{ 'agents' in include_agent_config }}"

hooks:
  post_generate:
    - command: "ruff format {{module_name}}_module/"
      description: "Format generated code"
      continue_on_error: true
    - command: "ruff check {{module_name}}_module/ --fix"
      description: "Fix linting issues"
      continue_on_error: true
