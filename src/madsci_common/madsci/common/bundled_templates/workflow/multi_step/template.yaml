name: "Multi-Step Workflow"
version: "1.0.0"
description: "A multi-step workflow with sequential node actions"
category: "workflow"
tags: ["multi-step", "sequential", "workflow"]

author: "MADSci Team"
license: "MIT"
min_madsci_version: "0.6.0"
schema_version: "1.0"

parameters:
  - name: workflow_name
    type: string
    description: "Workflow name (lowercase, underscores allowed)"
    required: true
    pattern: "^[a-z][a-z0-9_]*$"
    default: "my_workflow"

  - name: workflow_description
    type: string
    description: "Human-readable description of the workflow"
    required: true
    default: "A multi-step MADSci workflow"

  - name: node_1_name
    type: string
    description: "Name of the first node"
    required: true
    default: "node_1"

  - name: node_1_action
    type: string
    description: "Action to call on the first node"
    required: true
    default: "action_1"

  - name: node_2_name
    type: string
    description: "Name of the second node"
    required: true
    default: "node_2"

  - name: node_2_action
    type: string
    description: "Action to call on the second node"
    required: true
    default: "action_2"

files:
  - source: "{{workflow_name}}.workflow.yaml.j2"
    destination: "{{workflow_name}}.workflow.yaml"
