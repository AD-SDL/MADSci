name: "Basic Workflow"
version: "1.0.0"
description: "A simple single-step workflow"
category: "workflow"
tags: ["basic", "simple", "starter"]

author: "MADSci Team"
license: "MIT"
min_madsci_version: "0.6.0"
schema_version: "1.0"

parameters:
  - name: workflow_name
    type: string
    description: "Workflow name (lowercase, underscores allowed)"
    required: true
    pattern: "^[a-z][a-z0-9_]*$"
    default: "my_workflow"

  - name: workflow_description
    type: string
    description: "Human-readable description of the workflow"
    required: true
    default: "A MADSci workflow"

  - name: node_name
    type: string
    description: "Name of the node to call"
    required: true
    default: "example_node"

  - name: action_name
    type: string
    description: "Name of the action to execute"
    required: true
    default: "example_action"

files:
  - source: "{{workflow_name}}.workflow.yaml.j2"
    destination: "{{workflow_name}}.workflow.yaml"
