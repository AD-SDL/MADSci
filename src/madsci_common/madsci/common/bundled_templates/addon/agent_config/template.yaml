name: "Agent Configuration"
version: "1.0.0"
description: "Add agentic coding configuration files (CLAUDE.md, AGENTS.md) to an existing module"
category: "addon"
tags: ["agent", "claude", "ai"]
skills: ["madsci-nodes"]

author: "MADSci Team"
license: "MIT"
min_madsci_version: "0.6.0"
schema_version: "1.0"

parameters:
  - name: module_name
    type: string
    description: "Module name (lowercase, underscores allowed)"
    required: true
    pattern: "^[a-z][a-z0-9_]*$"
    default: "my_device"

  - name: module_description
    type: string
    description: "Human-readable description of the module"
    required: false
    default: "A MADSci node module"

  - name: include_agent_config
    type: multi_choice
    description: "Include agentic coding configuration files"
    required: false
    choices:
      - value: claude
        label: "Claude Code (CLAUDE.md, .claude/skills/)"
        default: true
      - value: agents
        label: "Agents (AGENTS.md, .agents/skills/)"
        default: true

files:
  - source: "CLAUDE.md.j2"
    destination: "CLAUDE.md"
    condition: "{{ 'claude' in include_agent_config }}"
  - source: "AGENTS.md.j2"
    destination: "AGENTS.md"
    condition: "{{ 'agents' in include_agent_config }}"
